name: Terraform Modules — CI

# Cheap-but-load-bearing gates for every PR and every push to main.
# Catches the things that would otherwise only fail at a customer's
# `terraform apply`: malformed HCL, fmt drift, undeclared variable
# references, mis-typed resource attributes.
#
# A real `terraform plan` against AWS/Azure needs credentials and is
# scoped out of this workflow — that's what the SAT/ASM Packer +
# end-to-end smoke pipelines cover. Here we only need to know the
# HCL parses, formats, and validates.

on:
  pull_request:
    paths:
      - 'modules/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'modules/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

concurrency:
  group: tf-ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: '1.9.8'
  TFLINT_VERSION: 'v0.55.0'

jobs:
  fmt:
    name: terraform fmt -check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: terraform fmt (check, recursive)
        run: |
          if ! terraform fmt -check -recursive -diff; then
            echo "::error::terraform fmt drift detected. Run: terraform fmt -recursive"
            exit 1
          fi

  validate:
    name: terraform validate — ${{ matrix.module }}
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    strategy:
      # Don't cancel sibling validations: a syntax error in one module
      # shouldn't hide a different error in another. Each module is a
      # tiny independent terraform init + validate.
      fail-fast: false
      matrix:
        module:
          # AWS — single, HA, autoscale (shared cores)
          - single-vm/aws
          - ha-hot-hot/aws
          - unlimited-scale/aws
          # Azure — same three tiers
          - single-vm/azure
          - ha-hot-hot/azure
          - unlimited-scale/azure
          # Per-product wrappers (thin shims around the core modules)
          - sat-aws-single
          - sat-aws-ha
          - sat-aws-autoscale
          - sat-azure-single
          - sat-azure-ha
          - sat-azure-autoscale
          - asm-aws-single
          - asm-aws-ha
          - asm-aws-autoscale
          - asm-azure-single
          - asm-azure-ha
          - asm-azure-autoscale
          # Shared infra
          - network/aws
          - network/azure
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: terraform init (no backend, no providers download cache)
        working-directory: modules/${{ matrix.module }}
        run: |
          # -backend=false skips remote state config — none of these
          # modules use a backend at the module level; consumers supply
          # one. -input=false fails fast on missing inputs instead of
          # hanging waiting for prompts.
          terraform init -backend=false -input=false

      - name: terraform validate
        working-directory: modules/${{ matrix.module }}
        run: terraform validate -no-color

  tflint:
    name: tflint
    runs-on: ubuntu-24.04
    timeout-minutes: 6
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache tflint plugins
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ~/.tflint.d/plugins
          key: tflint-${{ env.TFLINT_VERSION }}-${{ runner.os }}-${{ hashFiles('.tflint.hcl') }}

      - name: Set up tflint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4.1.1
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: tflint init (plugins)
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: tflint — recursive
        run: tflint --recursive --format=compact --minimum-failure-severity=error

  cost-shapes-sync:
    name: COST_SHAPES.md sync check
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    # Cheap structural check: COST_SHAPES.md should mention every AWS
    # tier and every meter-line marker. If someone adds a new module
    # tier and forgets the cost table, this catches it before
    # procurement does.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Assert canonical cost markers present
        run: |
          required=(
            "single-vm/aws"
            "ha-hot-hot/aws"
            "unlimited-scale/aws"
            "0.24/vCPU"
          )
          missing=()
          for marker in "${required[@]}"; do
            if ! grep -qF "$marker" COST_SHAPES.md; then
              missing+=("$marker")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::COST_SHAPES.md is missing required markers: ${missing[*]}"
            echo "::error::Update COST_SHAPES.md before merging — it's the canonical procurement-grade reference."
            exit 1
          fi
          echo "All required cost-shape markers present."
