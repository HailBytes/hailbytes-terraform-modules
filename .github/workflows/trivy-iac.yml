name: trivy-iac

on:
  pull_request:
    paths:
      - 'modules/**'
      - '.github/workflows/trivy-iac.yml'
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # The trivy-action (Docker) does not reliably apply the repo-root
      # .trivyignore (it runs trivy in a context where neither auto-discovery nor
      # a relative ignorefile path resolves). Install the trivy CLI directly and
      # invoke it ourselves so --ignorefile is honored. The binary is checksum-
      # verified before use, consistent with the SHA-pinned actions in this repo.
      - name: Install Trivy
        env:
          TRIVY_VERSION: 0.70.0
        run: |
          set -eo pipefail
          tarball="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -sSfL -o "/tmp/${tarball}" \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${tarball}"
          curl -sSfL -o /tmp/trivy_checksums.txt \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt"
          (cd /tmp && grep "${tarball}\$" trivy_checksums.txt | sha256sum --check)
          tar -xzf "/tmp/${tarball}" -C /tmp trivy
          sudo install -m 755 /tmp/trivy /usr/local/bin/trivy
          trivy --version

      # Produces SARIF for the code-scanning UI and fails the build (exit-code 1)
      # on any MEDIUM+ misconfiguration not waived in .trivyignore.
      - name: Run Trivy IaC scan
        run: |
          trivy config modules/ \
            --severity MEDIUM,HIGH,CRITICAL \
            --ignorefile .trivyignore \
            --format sarif --output trivy.sarif \
            --exit-code 1 --skip-version-check

      - name: Upload Trivy SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v3.27.5
        with:
          sarif_file: trivy.sarif
          category: trivy-iac
