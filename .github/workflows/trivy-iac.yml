name: trivy-iac

on:
  pull_request:
    paths:
      - 'modules/**'
      - '.github/workflows/trivy-iac.yml'
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: modules/
          format: sarif
          output: trivy.sarif
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@28deaeda66b76a05916b6923827895f2b14ab387 # v3.27.5
        with:
          sarif_file: trivy.sarif
          category: trivy-iac
