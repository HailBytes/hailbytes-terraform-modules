name: checkov

on:
  pull_request:
    paths:
      - 'modules/**'
      - '.github/workflows/checkov.yml'
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  checkov:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Checkov on Terraform modules
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12
        with:
          directory: modules/
          framework: terraform
          # Skip list, suppression rationale, and category breakdown
          # live in .checkov.yaml at the repo root. Every entry there
          # carries a one-line reason in a comment; PRs that add new
          # suppressions without rationale are rejected at review.
          config_file: .checkov.yaml
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: false
          quiet: true

      - name: Upload Checkov SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v3.27.5
        with:
          sarif_file: checkov.sarif
          category: checkov
