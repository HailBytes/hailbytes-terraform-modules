name: terraform-validate

on:
  pull_request:
    paths:
      - 'modules/**'
      - '.github/workflows/terraform-validate.yml'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        module:
          # Internal tier modules (one implementation per tier x cloud)
          - modules/single-vm/aws
          - modules/single-vm/azure
          - modules/ha-hot-hot/aws
          - modules/ha-hot-hot/azure
          - modules/unlimited-scale/aws
          - modules/unlimited-scale/azure
          # Product-first wrapper modules (the public API)
          - modules/asm-aws-single
          - modules/asm-aws-ha
          - modules/asm-aws-autoscale
          - modules/asm-azure-single
          - modules/asm-azure-ha
          - modules/asm-azure-autoscale
          - modules/sat-aws-single
          - modules/sat-aws-ha
          - modules/sat-aws-autoscale
          - modules/sat-azure-single
          - modules/sat-azure-ha
          - modules/sat-azure-autoscale
          # Supporting modules
          - modules/network/aws
          - modules/network/azure
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: terraform fmt
        run: terraform -chdir=${{ matrix.module }} fmt -check -recursive

      - name: terraform init -backend=false
        run: terraform -chdir=${{ matrix.module }} init -backend=false

      - name: terraform validate
        run: terraform -chdir=${{ matrix.module }} validate
